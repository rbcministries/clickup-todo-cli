name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore clickup-todo.slnx

      - name: Build
        run: dotnet build clickup-todo.slnx --configuration Release --no-restore

      # ClickUp integration tests skip automatically when CLICKUP_TOKEN is absent.
      - name: Test
        run: dotnet test clickup-todo.slnx --configuration Release --no-build --verbosity normal
